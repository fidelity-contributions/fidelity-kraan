{{- if .Values.gotk.crdMigration.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/instance: {{ .Release.Namespace }}
    app.kubernetes.io/version: latest
  name: {{ .Values.gotk.helmController.name }}-crd-migrator
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: {{ .Release.Namespace }}
    app.kubernetes.io/version: latest
  name: {{ .Release.Namespace }}-helmrelease-crd-migrator
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
{{- $groups := dict }}
{{- range .Values.gotk.crdMigration.crds }}
  {{- $existing := get $groups .group | default list }}
  {{- $_ := set $groups .group (append $existing .resource) }}
{{- end }}
{{- range $group, $resources := $groups }}
  - apiGroups:
      - {{ $group }}
    resources:
    {{- range $resources }}
      - {{ . }}
    {{- end }}
    verbs:
      - get
      - list
      - patch
{{- end }}
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
      - customresourcedefinitions/status
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/instance: {{ .Release.Namespace }}
    app.kubernetes.io/version: latest
  name: {{ .Release.Namespace }}-helmrelease-crd-migrator
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-30"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-helmrelease-crd-migrator
subjects:
  - kind: ServiceAccount
    name: {{ .Values.gotk.helmController.name }}-crd-migrator
    namespace: {{ .Release.Namespace }}
{{- end }}
